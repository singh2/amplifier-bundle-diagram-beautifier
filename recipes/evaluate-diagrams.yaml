# =============================================================================
# Evaluate Diagram Beautifier
# =============================================================================
#
# Runs every diagram in eval/diagrams/ through the diagram beautifier agent,
# producing Dark Mode Tech, Clean Minimalist, Sketchnote, and Claymation variants
# for each input. Handles all three input formats: .dot (Graphviz source),
# .mmd (Mermaid source), .png (existing diagram image -- skips the render step).
#
# Usage:
#   amplifier run "execute recipes/evaluate-diagrams.yaml"
#
# Prerequisites:
#   - GOOGLE_API_KEY environment variable set (nano-banana image generation)
#   - Graphviz `dot` CLI available (for .dot source rendering)
#   - `mmdc` CLI available (for .mmd source rendering -- npm i -g @mermaid-js/mermaid-cli)
#
# Output per diagram:
#   eval-results/<timestamp>-diagrams/<diagram-name>/<diagram-name>_darkmode.png
#   eval-results/<timestamp>-diagrams/<diagram-name>/<diagram-name>_minimal.png
#   eval-results/<timestamp>-diagrams/<diagram-name>/<diagram-name>_sketchnote.png
#   eval-results/<timestamp>-diagrams/<diagram-name>/<diagram-name>_claymation.png
#   eval-results/<timestamp>-diagrams/<diagram-name>/quality.json
#
# Quality report:
#   eval-results/<timestamp>-diagrams/quality-report.json (aggregate)
#
# =============================================================================

name: "evaluate-diagram-beautifier"
description: "Batch-run all diagrams in eval/diagrams/ through the diagram beautifier, producing four aesthetic variants per diagram with structured quality reporting"
version: "2.0.0"
tags: ["evaluation", "diagram-beautifier", "batch"]

context:
  diagrams_dir: "eval/diagrams"

steps:
  # ---------------------------------------------------------------------------
  # Step 1: Create a timestamped run directory
  # ---------------------------------------------------------------------------
  - id: "setup"
    type: "bash"
    command: >
      RUN_DIR="eval-results/$(date +%Y-%m-%d_%H%M%S)-diagrams" &&
      mkdir -p "$RUN_DIR" &&
      printf "%s" "$RUN_DIR"
    output: "run_dir"

  # ---------------------------------------------------------------------------
  # Step 2: Discover diagram files in eval/diagrams/ and emit as JSON
  #
  # Picks up .dot, .mmd, and .png files. Skips macOS metadata files.
  # Emits a JSON array of {name, filename, path, fmt} objects for foreach.
  # ---------------------------------------------------------------------------
  - id: "load-diagrams"
    type: "bash"
    command: |
      python3 -c "
      import os, json
      d = '{{diagrams_dir}}'
      exts = {'.dot', '.mmd', '.png'}
      files = sorted([
          f for f in os.listdir(d)
          if os.path.splitext(f)[1].lower() in exts
          and not f.startswith('.')
      ])
      diagrams = [
          {
              'name': os.path.splitext(f)[0],
              'filename': f,
              'path': os.path.join(d, f),
              'fmt': {'mmd': 'mermaid'}.get(os.path.splitext(f)[1].lstrip('.'), os.path.splitext(f)[1].lstrip('.'))
          }
          for f in files
      ]
      print(json.dumps(diagrams))
      "
    output: "diagrams"

  # ---------------------------------------------------------------------------
  # Step 3: Beautify each diagram -- full workflow, all four variants
  #
  # Each diagram gets its own subdirectory under the run dir. The agent runs
  # the complete diagram-beautifier workflow including:
  #   Steps 1-5: Parse, dependency check, aesthetic selection, decompose, beautify
  #   Steps 6a-6e: Quality review (1-5 scoring) + programmatic verification
  #   Steps 7-8: Assemble panels, present results
  #
  # The agent is instructed to save quality scores to a JSON file alongside
  # the generated images, enabling structured quality aggregation.
  # ---------------------------------------------------------------------------
  - id: "beautify-diagrams"
    foreach: "{{diagrams}}"
    as: "diagram"
    steps:
      - id: "create-diagram-dir"
        type: "bash"
        command: >
          mkdir -p "{{run_dir}}/{{diagram.name}}" &&
          printf "%s" "{{run_dir}}/{{diagram.name}}"

      - id: "beautify"
        agent: "diagram-beautifier:diagram-beautifier"
        prompt: |
          Beautify this diagram.

          Input: {{diagram.path}} (format: {{diagram.fmt}})

          Save image outputs to {{run_dir}}/{{diagram.name}}/:
          - {{diagram.name}}_darkmode.png
          - {{diagram.name}}_minimal.png
          - {{diagram.name}}_sketchnote.png
          - {{diagram.name}}_claymation.png

          After completing all quality reviews (Steps 6a-6e), save a quality
          summary as JSON to {{run_dir}}/{{diagram.name}}/quality.json with
          this structure:
          {
            "diagram": "{{diagram.name}}",
            "format": "{{diagram.fmt}}",
            "node_count": <from topology manifest>,
            "edge_count": <from topology manifest>,
            "style_override": <true if 25+ nodes triggered style substitution, false otherwise>,
            "variants": {
              "darkmode": {
                "actual_style": "Dark Mode Tech",
                "content_accuracy": <1-5>, "layout_quality": <1-5>,
                "visual_clarity": <1-5>, "prompt_fidelity": <1-5>,
                "aesthetic_fidelity": <1-5>, "label_fidelity": <1-5>,
                "structural_accuracy": <1-5>, "color_category_fidelity": <1-5>,
                "verification": {
                  "label_completeness": <0.0-1.0>,
                  "edge_completeness": <0.0-1.0>,
                  "missing_labels": [<list>],
                  "missing_edges": [<list>],
                  "duplicates": [<list of labels appearing more than once>]
                }
              },
              "minimal": {
                "actual_style": "Clean Minimalist",
                "content_accuracy": <1-5>, "layout_quality": <1-5>,
                "visual_clarity": <1-5>, "prompt_fidelity": <1-5>,
                "aesthetic_fidelity": <1-5>, "label_fidelity": <1-5>,
                "structural_accuracy": <1-5>, "color_category_fidelity": <1-5>,
                "verification": {
                  "label_completeness": <0.0-1.0>,
                  "edge_completeness": <0.0-1.0>,
                  "missing_labels": [<list>],
                  "missing_edges": [<list>],
                  "duplicates": [<list>]
                }
              },
              "sketchnote": {
                "actual_style": <"Hand-Drawn Sketchnote" or "Blueprint / Schematic" if style_override>,
                "content_accuracy": <1-5>, "layout_quality": <1-5>,
                "visual_clarity": <1-5>, "prompt_fidelity": <1-5>,
                "aesthetic_fidelity": <1-5>, "label_fidelity": <1-5>,
                "structural_accuracy": <1-5>, "color_category_fidelity": <1-5>,
                "verification": {
                  "label_completeness": <0.0-1.0>,
                  "edge_completeness": <0.0-1.0>,
                  "missing_labels": [<list>],
                  "missing_edges": [<list>],
                  "duplicates": [<list>]
                }
              },
              "claymation": {
                "actual_style": <"Claymation Studio" or "Cyberpunk / Neon" if style_override>,
                "content_accuracy": <1-5>, "layout_quality": <1-5>,
                "visual_clarity": <1-5>, "prompt_fidelity": <1-5>,
                "aesthetic_fidelity": <1-5>, "label_fidelity": <1-5>,
                "structural_accuracy": <1-5>, "color_category_fidelity": <1-5>,
                "verification": {
                  "label_completeness": <0.0-1.0>,
                  "edge_completeness": <0.0-1.0>,
                  "missing_labels": [<list>],
                  "missing_edges": [<list>],
                  "duplicates": [<list>]
                }
              }
            }
          }

          Run programmatic verification (Step 6e) separately for EACH variant's
          generated image. Each variant gets its own label_completeness,
          edge_completeness, missing_labels, missing_edges, and duplicates.

          Also save the source rendering (from Step 2) as:
          {{run_dir}}/{{diagram.name}}/{{diagram.name}}_source.png
        timeout: 1800
        on_error: "continue"

      - id: "verify"
        type: "bash"
        command: |
          DIR="{{run_dir}}/{{diagram.name}}"
          LOG="{{run_dir}}/failures.log"
          PNG_COUNT=$(find "$DIR" -name "*.png" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$PNG_COUNT" -eq 0 ]; then
            echo "FAILED: {{diagram.name}}" | tee -a "$LOG" >&2
            exit 1
          else
            echo "OK: {{diagram.name}} -- $PNG_COUNT image(s) in $DIR"
          fi
        on_error: "continue"

  # ---------------------------------------------------------------------------
  # Step 4: Aggregate quality data and compile summary report
  #
  # Reads per-diagram quality.json files and produces an aggregate report
  # with quality scores, complexity band analysis, and threshold detection.
  # ---------------------------------------------------------------------------
  - id: "generate-report"
    type: "bash"
    command: |
      python3 -c "
      import os, json, sys

      run_dir = '{{run_dir}}'
      quality_data = []
      missing_quality = []

      for name in sorted(os.listdir(run_dir)):
          diagram_dir = os.path.join(run_dir, name)
          if not os.path.isdir(diagram_dir):
              continue
          quality_file = os.path.join(diagram_dir, 'quality.json')
          if os.path.exists(quality_file):
              with open(quality_file) as f:
                  quality_data.append(json.load(f))
          else:
              missing_quality.append(name)

      report = {
          'run_dir': run_dir,
          'total_diagrams': len(quality_data) + len(missing_quality),
          'with_quality_data': len(quality_data),
          'missing_quality_data': missing_quality,
          'diagrams': quality_data,
      }

      if quality_data:
          dimensions = [
              'content_accuracy', 'layout_quality', 'visual_clarity',
              'prompt_fidelity', 'aesthetic_fidelity', 'label_fidelity',
              'structural_accuracy', 'color_category_fidelity',
          ]
          variant_keys = ['darkmode', 'minimal', 'sketchnote', 'claymation']

          # Per-dimension aggregation (all variants pooled)
          dim_scores = {dim: [] for dim in dimensions}
          for d in quality_data:
              for v in d.get('variants', {}).values():
                  for dim in dimensions:
                      if dim in v and isinstance(v[dim], (int, float)):
                          dim_scores[dim].append(v[dim])

          agg = {}
          for dim in dimensions:
              scores = dim_scores[dim]
              agg['avg_' + dim] = round(sum(scores) / len(scores), 2) if scores else None
              agg['min_' + dim] = min(scores) if scores else None

          # Per-variant aggregation
          variant_agg = {}
          for vk in variant_keys:
              v_scores = {dim: [] for dim in dimensions}
              v_label_comp = []
              v_edge_comp = []
              v_dup_count = 0
              actual_styles = set()
              for d in quality_data:
                  v = d.get('variants', {}).get(vk, {})
                  for dim in dimensions:
                      if dim in v and isinstance(v[dim], (int, float)):
                          v_scores[dim].append(v[dim])
                  if 'actual_style' in v:
                      actual_styles.add(v['actual_style'])
                  ver = v.get('verification', {})
                  if 'label_completeness' in ver:
                      v_label_comp.append(ver['label_completeness'])
                  if 'edge_completeness' in ver:
                      v_edge_comp.append(ver['edge_completeness'])
                  v_dup_count += len(ver.get('duplicates', []))

              entry = {'actual_styles': sorted(actual_styles)}
              for dim in dimensions:
                  s = v_scores[dim]
                  entry['avg_' + dim] = round(sum(s) / len(s), 2) if s else None
              entry['avg_label_completeness'] = round(sum(v_label_comp) / len(v_label_comp), 3) if v_label_comp else None
              entry['avg_edge_completeness'] = round(sum(v_edge_comp) / len(v_edge_comp), 3) if v_edge_comp else None
              entry['total_duplicates'] = v_dup_count
              variant_agg[vk] = entry

          agg['by_variant'] = variant_agg

          # Overall verification averages
          all_label_comp = []
          all_edge_comp = []
          total_dups = 0
          for d in quality_data:
              for v in d.get('variants', {}).values():
                  ver = v.get('verification', {})
                  if 'label_completeness' in ver:
                      all_label_comp.append(ver['label_completeness'])
                  if 'edge_completeness' in ver:
                      all_edge_comp.append(ver['edge_completeness'])
                  total_dups += len(ver.get('duplicates', []))
          agg['avg_label_completeness'] = round(sum(all_label_comp) / len(all_label_comp), 3) if all_label_comp else None
          agg['avg_edge_completeness'] = round(sum(all_edge_comp) / len(all_edge_comp), 3) if all_edge_comp else None
          agg['total_duplicates'] = total_dups

          report['aggregate'] = agg

          # Complexity band analysis
          bands = {'small (<=10)': [], 'medium (11-25)': [], 'large (26-40)': [], 'very_large (41+)': []}
          for d in quality_data:
              nc = d.get('node_count', 0)
              if nc <= 10: bands['small (<=10)'].append(d)
              elif nc <= 25: bands['medium (11-25)'].append(d)
              elif nc <= 40: bands['large (26-40)'].append(d)
              else: bands['very_large (41+)'].append(d)

          band_summary = {}
          for band_name, diagrams in bands.items():
              if not diagrams:
                  band_summary[band_name] = {'count': 0}
                  continue
              band_dim_scores = {dim: [] for dim in dimensions}
              band_label_comp = []
              band_edge_comp = []
              for d in diagrams:
                  for v in d.get('variants', {}).values():
                      for dim in dimensions:
                          if dim in v and isinstance(v[dim], (int, float)):
                              band_dim_scores[dim].append(v[dim])
                      ver = v.get('verification', {})
                      if 'label_completeness' in ver:
                          band_label_comp.append(ver['label_completeness'])
                      if 'edge_completeness' in ver:
                          band_edge_comp.append(ver['edge_completeness'])
              entry = {'count': len(diagrams)}
              for dim in dimensions:
                  s = band_dim_scores[dim]
                  entry['avg_' + dim] = round(sum(s) / len(s), 2) if s else None
                  entry['min_' + dim] = min(s) if s else None
              entry['avg_label_completeness'] = round(sum(band_label_comp) / len(band_label_comp), 3) if band_label_comp else None
              entry['avg_edge_completeness'] = round(sum(band_edge_comp) / len(band_edge_comp), 3) if band_edge_comp else None
              band_summary[band_name] = entry
          report['complexity_bands'] = band_summary

      report_path = os.path.join(run_dir, 'quality-report.json')
      with open(report_path, 'w') as f:
          json.dump(report, f, indent=2)
      print(json.dumps(report, indent=2))
      "

      echo ""
      echo "================================================="
      echo " Diagram Beautifier Evaluation Report"
      echo " Run: {{run_dir}}"
      echo "================================================="
      echo ""
      TOTAL_DIAGRAMS=0
      TOTAL_IMAGES=0
      FAILED=0
      for diagram_dir in "{{run_dir}}"/*/; do
        if [ -d "$diagram_dir" ]; then
          NAME=$(basename "$diagram_dir")
          COUNT=$(find "$diagram_dir" -name "*.png" 2>/dev/null | wc -l | tr -d ' ')
          TOTAL_DIAGRAMS=$((TOTAL_DIAGRAMS + 1))
          if [ "$COUNT" -gt 0 ]; then
            echo "  ✓  $NAME  ($COUNT images)"
            TOTAL_IMAGES=$((TOTAL_IMAGES + COUNT))
          else
            echo "  ✗  $NAME  (no output -- check logs)"
            FAILED=$((FAILED + 1))
          fi
        fi
      done
      echo ""
      echo "Diagrams processed:    $TOTAL_DIAGRAMS"
      echo "Total images:          $TOTAL_IMAGES"
      echo "Expected:              96  (24 diagrams × 4 images each)"
      echo "Failed:                $FAILED"
      echo ""
      echo "Quality report:        {{run_dir}}/quality-report.json"
      echo "Output directory:      {{run_dir}}"

  # ---------------------------------------------------------------------------
  # Step 5: Generate HTML viewer report
  # ---------------------------------------------------------------------------
  - id: "generate-viewer"
    type: "bash"
    command: |
      python -m diagram_beautifier.viewer "{{run_dir}}"
      echo "Viewer report generated: {{run_dir}}/report.html"
